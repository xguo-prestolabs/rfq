services:
  rfq-api:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.testnet
    network_mode: host
    restart: unless-stopped
