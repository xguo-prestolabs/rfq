<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deribit Block RFQ – Market Maker</title>
<style>
/* ── Reset & variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --accent:   #388bfd;
  --accent2:  #58a6ff;
  --success:  #3fb950;
  --danger:   #f85149;
  --warning:  #d29922;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --mono:     'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --radius:   6px;
  --sidebar-w: 270px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Layout ────────────────────────────────────────────────── */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 14px 12px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.main {
  flex: 1;
  padding: 20px 24px;
  min-width: 0;
}

/* ── Typography ────────────────────────────────────────────── */
h1 { font-size: 20px; font-weight: 700; }
h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

.page-header {
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.page-header small { color: var(--muted); font-size: 12px; }

.section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 16px;
}
.section-title:first-child { margin-top: 0; }

hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* ── Form controls ─────────────────────────────────────────── */
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }

input[type="text"],
input[type="password"],
input[type="number"],
select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 5px 9px;
  font-size: 13px;
  font-family: inherit;
  margin-bottom: 8px;
  transition: border-color .15s;
}
input:focus, select:focus { outline: none; border-color: var(--accent); }
input[type="number"] { font-family: var(--mono); }
input[type="checkbox"] { width: auto; accent-color: var(--accent); }

.field { margin-bottom: 6px; }
.row   { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.row label  { margin-bottom: 0; min-width: 64px; white-space: nowrap; }
.row input, .row select { margin-bottom: 0; flex: 1; min-width: 0; }
.check-row { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 8px; }
.check-row input { width: auto; }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 5px 13px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  white-space: nowrap;
  transition: filter .15s;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:not(:disabled):hover { filter: brightness(1.15); }

.btn-primary { background: var(--accent);   color: #fff; }
.btn-success { background: var(--success);  color: #fff; }
.btn-danger  { background: var(--danger);   color: #fff; }
.btn-warning { background: var(--warning);  color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-block   { width: 100%; margin-bottom: 6px; }
.btn-sm      { padding: 3px 9px; font-size: 12px; }

.btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

/* ── Status badge ──────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge-open     { background: rgba(63,185,80,.15);  color: var(--success); }
.badge-filled   { background: rgba(56,139,253,.15); color: var(--accent2); }
.badge-canceled { background: rgba(248,81,73,.15);  color: var(--danger); }
.badge-expired  { background: rgba(210,153,34,.15); color: var(--warning); }
.badge-ok       { background: rgba(63,185,80,.15);  color: var(--success); }
.badge-err      { background: rgba(248,81,73,.15);  color: var(--danger); }

/* ── Tabs ──────────────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.tab-btn {
  padding: 7px 14px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  font-weight: 500;
  transition: color .15s;
  margin-bottom: -1px;
}
.tab-btn:hover  { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── Table ─────────────────────────────────────────────────── */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 12px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr.combo { background: rgba(56,139,253,.05); font-weight: 600; }
tbody td { padding: 6px 10px; vertical-align: middle; }

/* ── RFQ card ──────────────────────────────────────────────── */
.rfq-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.rfq-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  user-select: none;
  background: var(--surface2);
}
.rfq-header:hover { background: #2a3040; }
.rfq-id   { font-weight: 700; font-family: var(--mono); font-size: 13px; }
.rfq-meta { flex: 1; font-size: 12px; color: var(--muted); }
.chevron  { font-size: 11px; color: var(--muted); transition: transform .2s; }
.rfq-card.expanded .chevron { transform: rotate(90deg); }

.rfq-body { display: none; padding: 14px; }
.rfq-card.expanded .rfq-body { display: block; }

.rfq-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 14px;
}
@media (max-width: 860px) { .rfq-grid { grid-template-columns: 1fr; } }

/* ── Quote panel ───────────────────────────────────────────── */
.quote-panel {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  align-self: start;
}
.quote-panel h3 { font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px; }
.active-qid { font-size: 11px; color: var(--success); font-family: var(--mono); margin-top: 6px; min-height: 16px; }

/* ── Hedge box ─────────────────────────────────────────────── */
.hedge-box {
  font-size: 12px;
  color: var(--muted);
  background: rgba(210,153,34,.07);
  border: 1px solid rgba(210,153,34,.25);
  border-radius: var(--radius);
  padding: 5px 9px;
  margin-bottom: 10px;
}

/* ── Meta row ──────────────────────────────────────────────── */
.meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.meta span { color: var(--text); }

/* ── Alerts ────────────────────────────────────────────────── */
.alert {
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 12px;
}
.alert-info    { background: rgba(56,139,253,.1);  border: 1px solid rgba(56,139,253,.25);  color: var(--accent2); }
.alert-success { background: rgba(63,185,80,.1);   border: 1px solid rgba(63,185,80,.25);   color: var(--success); }
.alert-danger  { background: rgba(248,81,73,.1);   border: 1px solid rgba(248,81,73,.25);   color: var(--danger); }
.alert-warning { background: rgba(210,153,34,.1);  border: 1px solid rgba(210,153,34,.25);  color: var(--warning); }

/* ── Toast ─────────────────────────────────────────────────── */
#toasts {
  position: fixed; top: 14px; right: 14px;
  z-index: 9999;
  display: flex; flex-direction: column; gap: 7px;
  pointer-events: none;
  max-width: 320px;
}
.toast {
  padding: 9px 12px 9px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-weight: 500;
  pointer-events: all;
  animation: fadeIn .2s ease;
  word-wrap: break-word;
}
.toast-success { background: #1c3a20; border: 1px solid var(--success); color: var(--success); }
.toast-error   { background: #3a1c1c; border: 1px solid var(--danger);  color: var(--danger);  pointer-events: auto; }
.toast-info    { background: #1c2a3a; border: 1px solid var(--accent);  color: var(--accent2); }
.toast-msg     { flex: 1; word-break: break-word; }
.toast-close   {
  flex: none;
  background: none;
  border: none;
  color: inherit;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  padding: 0;
  opacity: .7;
}
.toast-close:hover { opacity: 1; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }

/* ── Spinner ───────────────────────────────────────────────── */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 32px; color: var(--muted); }

/* ── Colour helpers ────────────────────────────────────────── */
.pos  { color: var(--success); }
.neg  { color: var(--danger); }
.warn { color: var(--warning); }
.mono { font-family: var(--mono); }
.dim  { color: var(--muted); }

/* ── My Quotes (per-card) ──────────────────────────────────── */
.my-quotes-section {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.my-quotes-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 6px;
}

/* ── Position Greeks ───────────────────────────────────────── */
.greek-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 3px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.greek-row:last-child { border-bottom: none; }
.greek-label { color: var(--muted); }
.greek-val   { font-family: var(--mono); font-size: 12px; }
#total-greeks-box { margin-top: 4px; }

/* ── Recent Trades ─────────────────────────────────────────── */
.trade-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 8px;
  margin-bottom: 6px;
  font-size: 11px;
}
.trade-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}
.trade-id   { font-family: var(--mono); color: var(--accent2); font-size: 11px; }
.trade-time { color: var(--muted); font-size: 10px; }
.trade-leg  { color: var(--muted); white-space: nowrap; overflow: hidden;
              text-overflow: ellipsis; }
#recent-trades-box { margin-top: 4px; }

/* ── Bottom bar ────────────────────────────────────────────── */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 12px;
}
</style>
</head>
<body>

<div id="toasts"></div>

<div class="layout">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">

    <div class="section-title">🚨 Cancel All Quotes</div>
    <div class="field"><label>Currency</label>
      <select id="cancel-cur">
        <option value="all">All</option>
        <option value="BTC">BTC</option>
        <option value="ETH">ETH</option>
      </select>
    </div>
    <button class="btn btn-danger btn-block" onclick="cancelAll()">Cancel All Quotes</button>

    <hr>

    <div class="section-title">📐 Position Dollar Greeks</div>
    <div id="total-greeks-box">
      <span class="dim" style="font-size:12px">Loading…</span>
    </div>

    <hr>

    <div class="section-title">🔄 Recent Trades</div>
    <div id="recent-trades-box">
      <span class="dim" style="font-size:12px">Loading…</span>
    </div>

  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main">

    <div class="page-header">
      <h1 id="page-title">Deribit Block RFQ</h1>
      <small>Market Maker Dashboard</small>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="rfqs"   onclick="switchTab(this)">📋 RFQs</button>
      <button class="tab-btn"        data-tab="quotes" onclick="switchTab(this)">💬 My Quotes</button>
    </div>

    <div id="tab-rfqs" class="tab-pane active">
      <div id="rfqs-container">
        <div class="loading"><span class="spin"></span> Loading RFQs…</div>
      </div>
    </div>

    <div id="tab-quotes" class="tab-pane">
      <div id="quotes-container">
        <div class="loading"><span class="spin"></span> Loading quotes…</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="check-row">
        <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()">
        <label for="auto-refresh">Auto-refresh (5 s)</label>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="redis-status" class="dim" title="Redis pub/sub health" style="font-size:12px">⬤ Redis…</span>
        <span id="live-status" class="dim" title="WebSocket live updates" style="font-size:12px">⬤ WS…</span>
        <button class="btn btn-outline btn-sm" onclick="refresh()">🔄 Refresh</button>
        <span id="ts" class="dim">—</span>
      </div>
    </div>

  </main>
</div><!-- end .layout -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   Constants & state
═══════════════════════════════════════════════════════════════ */
// Derive API base from the current page URL so requests work whether the app
// is served at the root (/) or behind an nginx subpath (e.g. /rfq/).
// new URL('.', 'https://host/rfq/')  → 'https://host/rfq/' → BASE = '/rfq'
// new URL('.', 'https://host/')      → 'https://host/'     → BASE = ''
const BASE = new URL('.', location.href).pathname.replace(/\/$/, '');

const S = {
  tab:        'rfqs',
  quoteIds:   {},   // rfqId (str) → most recent open block_rfq_quote_id
  myQuotes:   {},   // rfqId (str) → [quote, …] all quotes for that RFQ
  rfqCache:   {},   // rfqId (str) → enriched rfq object
  timer:      null,
  ttxTimer:   null, // per-second countdown timer
  priceTimer: null, // per-second fair price updater for open RFQs
};

/* ═══════════════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════════════ */
async function GET(path) {
  const t0 = performance.now();
  const resp = await fetch(BASE + path);
  console.log(`[GET]  ${path} — ${(performance.now() - t0).toFixed(0)} ms  (${resp.status})`);
  return resp;
}

async function POST(path, body, params) {
  let url = BASE + path;
  if (params) url += '?' + new URLSearchParams(params);
  const t0 = performance.now();
  const resp = await fetch(url, {
    method:  'POST',
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body:    body ? JSON.stringify(body) : undefined,
  });
  console.log(`[POST] ${path} — ${(performance.now() - t0).toFixed(0)} ms  (${resp.status})`);
  return resp;
}

async function errMsg(resp) {
  try { const d = await resp.clone().json(); return d.detail || d.message || resp.statusText; }
  catch { return resp.statusText; }
}

/* ═══════════════════════════════════════════════════════════════
   Toast
═══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'info', ms = 4500) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  if (type === 'error') {
    el.innerHTML = `<span class="toast-msg">${esc(msg)}</span>
      <button class="toast-close" onclick="this.closest('.toast').remove()" title="Dismiss">✕</button>`;
  } else {
    el.innerHTML = `<span class="toast-msg">${esc(msg)}</span>`;
    setTimeout(() => el.remove(), ms);
  }
  document.getElementById('toasts').appendChild(el);
}

/* ═══════════════════════════════════════════════════════════════
   Tabs
═══════════════════════════════════════════════════════════════ */
function switchTab(btn) {
  S.tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `tab-${S.tab}`));
  refresh();
}

/* ═══════════════════════════════════════════════════════════════
   Auto-refresh
═══════════════════════════════════════════════════════════════ */
function toggleAutoRefresh() {
  clearInterval(S.timer);
  if (document.getElementById('auto-refresh').checked)
    S.timer = setInterval(refresh, 5000);
}

function refresh() {
  if (S.tab === 'rfqs') loadRFQs(); else loadQuotes();
  document.getElementById('ts').textContent = new Date().toLocaleTimeString();
}

/* ═══════════════════════════════════════════════════════════════
   Cancel All
═══════════════════════════════════════════════════════════════ */
async function cancelAll() {
  const cur  = document.getElementById('cancel-cur').value;
  const body = cur === 'all' ? {} : { currency: cur };
  try {
    const resp = await POST('/quotes/cancel_all', body);
    const data = await resp.json();
    if (resp.ok) {
      const n = data.result ?? 0;
      for (const k of Object.keys(S.quoteIds)) delete S.quoteIds[k];
      toast(`Cancelled ${n} quote(s)`, 'success');
      refresh();
    } else {
      toast('Cancel all failed: ' + (data.detail || resp.statusText), 'error');
    }
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}


/* ═══════════════════════════════════════════════════════════════
   RFQs Tab
═══════════════════════════════════════════════════════════════ */
async function loadRFQs() {
  const cont = document.getElementById('rfqs-container');
  cont.innerHTML = '<div class="loading"><span class="spin"></span> Loading…</div>';
  try {
    const resp = await GET('/rfqs');
    if (!resp.ok) {
      cont.innerHTML = `<div class="alert alert-danger">Failed to load RFQs (${resp.status})</div>`;
      return;
    }
    const rfqs = await resp.json();
    const ids  = Object.keys(rfqs).sort((a, b) => parseInt(b) - parseInt(a));
    if (!ids.length) { cont.innerHTML = '<div class="alert alert-info">No active RFQs</div>'; return; }

    // Render placeholder skeletons immediately in sorted order so the page isn't blank
    // while per-leg price/greeks queries are in flight.
    cont.innerHTML = ids.map(id => `
      <div id="rfq-placeholder-${id}" class="rfq-card">
        <div class="rfq-header">
          <div class="rfq-id">#${id}</div>
          <div class="rfq-meta"><span class="spin"></span> Loading prices…</div>
        </div>
      </div>`).join('');

    const openIds  = ids.filter(id => rfqs[id].state === 'open');
    const otherIds = ids.filter(id => rfqs[id].state !== 'open');

    const renderOne = async id => {
      const { id: rid, rfq } = await enrichRFQ(id, rfqs[id]);
      S.rfqCache[rid] = rfq;
      const placeholder = document.getElementById(`rfq-placeholder-${rid}`);
      if (placeholder) {
        placeholder.insertAdjacentHTML('afterend', rfqCard(rid, rfq));
        placeholder.remove();
      }
      syncButtons(rid);
    };

    // Open RFQs are actionable — render them all in parallel first.
    await Promise.all(openIds.map(renderOne));

    // Expired/cancelled/filled RFQs are processed in batches of 5 so they don't
    // flood the server with all requests at once while still finishing faster than
    // fully sequential (one-at-a-time) processing.
    const BATCH = 5;
    for (let i = 0; i < otherIds.length; i += BATCH) {
      await Promise.all(otherIds.slice(i, i + BATCH).map(renderOne));
    }

    startCountdowns();
    loadMyQuotes();

  } catch (e) {
    cont.innerHTML = `<div class="alert alert-danger">Error: ${esc(e.message)}</div>`;
  }
}

async function enrichRFQ(id, rfq) {
  const legs = (rfq.legs || []).map(l => ({ ...l }));
  await Promise.all(legs.map(async leg => {
    const p = encodeURIComponent(leg.instrument_name);
    try {
      const r = await GET(`/price/${p}`);
      if (r.ok) { const d = await r.json(); leg.fair_price = d.price ?? null; leg.fair_price_ts = d.ts ?? null; }
      else { leg.fair_price = null; leg.fair_price_ts = null; }
    } catch { leg.fair_price = null; leg.fair_price_ts = null; }
    try {
      const r = await GET(`/greeks/${p}`);
      if (r.ok) { const g = (await r.json()).greeks || {}; leg._delta = g.delta||0; leg._gamma = g.gamma||0; leg._vega = g.vega||0; }
      else { leg._delta = leg._gamma = leg._vega = 0; }
    } catch { leg._delta = leg._gamma = leg._vega = 0; }
  }));
  return { id, rfq: { ...rfq, legs } };
}

function toDollarGreeks(leg, idx) {
  leg.delta = leg._delta * idx;
  leg.gamma = leg._gamma * idx * idx * 0.01;
  leg.vega  = leg._vega;  // vega from blackVega is already in dollar terms
}

function combo(rfq) {
  const idx = Object.values(rfq.index_prices || {})[0] || 1;
  const c = { instrument_name: rfq.combo_id || 'COMBO', direction: '—', ratio: '—', fair_price: null, delta: 0, gamma: 0, vega: 0 };
  let priceSum = 0, allPrices = true;
  for (const l of rfq.legs || []) {
    const s = l.direction === 'buy' ? 1 : -1, r = (l.ratio || 1) * s;
    if (l.fair_price === null || l.fair_price === undefined) { allPrices = false; }
    else { priceSum += l.fair_price * r; }
    toDollarGreeks(l, idx);
    c.delta += (l.delta || 0) * r;
    c.gamma += (l.gamma || 0) * r;
    c.vega  += (l.vega  || 0) * r;
  }
  c.fair_price = allPrices ? priceSum : null;
  return c;
}

function stateBadge(state) {
  const cls  = { open: 'open', filled: 'filled', canceled: 'canceled', cancelled: 'canceled', expired: 'expired' }[state] || 'open';
  const icon = { open: '🟢', filled: '✅', canceled: '❌', cancelled: '❌', expired: '⏰' }[state] || '⚪';
  return `<span class="badge badge-${cls}">${icon} ${state}</span>`;
}

function fmtPriceAge(tsNs) {
  if (!tsNs) return '—';
  const ageMs = Date.now() - Math.floor(tsNs / 1e6);
  if (ageMs < 0)    return '0ms';
  if (ageMs < 1000) return `${ageMs}ms`;
  return `${(ageMs / 1000).toFixed(1)}s ago`;
}

function fmtN(v, d = 4) {
  if (v === null || v === undefined) return 'N/A';
  const n = parseFloat(v);
  return isNaN(n) ? esc(String(v)) : n.toFixed(d);
}
function fmtCell(v) {
  if (v === null || v === undefined) return '<span class="dim">N/A</span>';
  const n = parseFloat(v);
  if (isNaN(n)) return `<span>${esc(String(v))}</span>`;
  return `<span class="mono ${n >= 0 ? 'pos' : 'neg'}">${n.toFixed(4)}</span>`;
}

function rfqCard(id, rfq) {
  const legs     = rfq.legs || [];
  const cmb      = combo(rfq);
  const hedge    = rfq.hedge || null;
  const isOpen   = rfq.state === 'open';
  const cts      = new Date(rfq.creation_timestamp).toLocaleString();
  const ets      = new Date(rfq.expiration_timestamp).toLocaleString();
  const defDir   = (legs[0]?.direction === 'buy') ? 'sell' : 'buy';
  const indexStr = Object.entries(rfq.index_prices || {})
    .map(([k, v]) => `${k.split('_')[0].toUpperCase()}: ${fmtN(v, 2)}`)
    .join(' · ');

  // Legs table
  const legRows = legs.map((l, i) => `<tr>
    <td class="mono" style="font-size:12px">${esc(l.instrument_name)}</td>
    <td><span class="${l.direction === 'buy' ? 'pos' : 'neg'}">${l.direction}</span></td>
    <td class="mono">${l.ratio}</td>
    <td class="mono" id="fp-${id}-${i}">
      <span id="fpv-${id}-${i}">${fmtN(l.fair_price, 8)}</span>
      <div id="fpts-${id}-${i}" class="dim" style="font-size:10px;margin-top:1px">${fmtPriceAge(l.fair_price_ts)}</div>
    </td>
    <td>${fmtCell(l.delta)}</td><td>${fmtCell(l.gamma)}</td><td>${fmtCell(l.vega)}</td>
  </tr>`).join('');

  const comboRow = `<tr class="combo">
    <td class="mono" style="font-size:12px">${esc(cmb.instrument_name)}<span class="dim">(combo)</span></td>
    <td>${cmb.direction}</td><td>${cmb.ratio}</td>
    <td class="mono" id="fp-${id}-combo">${fmtN(cmb.fair_price, 8)}</td>
    <td>${fmtCell(cmb.delta)}</td><td>${fmtCell(cmb.gamma)}</td><td>${fmtCell(cmb.vega)}</td>
  </tr>`;

  const hedgeHtml = hedge ? `<div class="hedge-box">
    ⚡ Hedge: <strong>${esc(hedge.instrument_name)}</strong>
    &nbsp;${hedge.direction.toUpperCase()} qty=${hedge.amount} @ ${hedge.price}
  </div>` : '';

  // Per-leg price inputs
  const legInputs = legs.map((l, i) => {
    const shortName = l.instrument_name.split('-').slice(-2).join('-');
    const hasPrice  = l.fair_price !== null && l.fair_price !== undefined;
    return `<div class="row" style="margin-bottom:5px">
      <label style="min-width:0;flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
             title="${esc(l.instrument_name)}">${esc(shortName)}</label>
      <input type="number" id="lp-${id}-${i}"
             value="${hasPrice ? fmtN(l.fair_price, 4) : ''}"
             placeholder="${hasPrice ? '' : 'N/A'}"
             step="${OPTION_TICK_SIZE}" min="0"
             style="width:110px;flex:none;font-size:12px;margin-bottom:0;text-align:right">
    </div>`;
  }).join('');

  return `
  <div class="rfq-card ${isOpen ? 'expanded' : ''}" id="rfq-${id}">
    <div class="rfq-header" onclick="toggleCard('${id}')">
      <div class="rfq-id">#${id}</div>
      ${stateBadge(rfq.state)}
      <div class="rfq-meta">${esc(rfq.combo_id || '')} &nbsp;·&nbsp; taker: ${esc(rfq.taker_rating || '—')}</div>
      <div class="chevron">▶</div>
    </div>
    <div class="rfq-body">
      <div class="meta">
        📅 Created: <span>${cts}</span> &nbsp;·&nbsp;
        ⏱ Expires: <span>${ets}</span> &nbsp;·&nbsp;
        ⏳ TTX: <span id="ttx-${id}" class="mono">—</span> &nbsp;·&nbsp;
        📦 Amount: <span>${rfq.amount}</span>
        ${indexStr ? `&nbsp;·&nbsp; 📈 Index: <span class="mono">${esc(indexStr)}</span>` : ''}
      </div>
      ${hedgeHtml}
      <div class="rfq-grid">
        <!-- Legs table -->
        <div>
          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th>Instrument</th><th>Direction</th><th>Ratio</th>
                <th>Fair Price</th><th>Dollar Delta</th><th>Dollar Gamma</th><th>Dollar Vega</th>
              </tr></thead>
              <tbody>${legRows}${comboRow}</tbody>
            </table>
          </div>
        </div>
        <!-- Quote panel -->
        <div class="quote-panel">
          <h3>Quote</h3>
          <div class="row">
            <label>Direction</label>
            <select id="dir-${id}" style="width:80px;flex:none;margin-bottom:0">
              <option value="sell" ${defDir === 'sell' ? 'selected' : ''}>sell</option>
              <option value="buy"  ${defDir === 'buy'  ? 'selected' : ''}>buy</option>
            </select>
          </div>
          <div class="row">
            <label>Amount</label>
            <input type="number" id="amt-${id}" value="${rfq.amount || 1}"
                   step="0.01" min="0" style="width:110px;flex:none;text-align:right;margin-bottom:0">
          </div>
          <div style="font-size:11px;color:var(--muted);margin:6px 0 4px">Leg prices:</div>
          ${legInputs}
          <div class="btn-group">
            <button id="btn-sub-${id}" class="btn btn-success btn-sm" onclick="submitQuote('${id}')">Submit</button>
            <button id="btn-edt-${id}" class="btn btn-warning btn-sm" onclick="editQuote('${id}')"   disabled>Edit</button>
            <button id="btn-can-${id}" class="btn btn-danger  btn-sm" onclick="cancelQuote('${id}')" disabled>Cancel</button>
          </div>
          <div class="active-qid" id="qinfo-${id}"></div>
        </div>
      </div>
      <div id="my-quotes-${id}">${myQuotesHtml(id)}</div>
    </div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById(`rfq-${id}`).classList.toggle('expanded');
}

function syncButtons(id) {
  const qid  = S.quoteIds[id];
  const bSub = document.getElementById(`btn-sub-${id}`);
  const bEdt = document.getElementById(`btn-edt-${id}`);
  const bCan = document.getElementById(`btn-can-${id}`);
  const info = document.getElementById(`qinfo-${id}`);
  if (!bSub) return;
  bSub.disabled = !!qid;
  bEdt.disabled = !qid;
  bCan.disabled = !qid;
  info.textContent = qid ? `Active quote ID: ${qid}` : '';
}

// Deribit requires option prices to be exact multiples of the tick size.
// Submitting a raw fair_price float (e.g. 0.052312847) causes error code 10043 (wrong_tick).
// Both BTC and ETH vanilla options use tick size 0.0001 (denominated in their respective currency).
// If Deribit ever changes tick sizes per instrument, replace the constant with a dynamic lookup
// via public/get_instrument → result.tick_size.
const OPTION_TICK_SIZE = 0.0001;
function roundToTick(price, tick = OPTION_TICK_SIZE) {
  return Math.round(price / tick) * tick;
}

function collectLegs(id) {
  const rfq = S.rfqCache[id];
  if (!rfq) return [];
  return (rfq.legs || []).map((l, i) => ({
    instrument_name: l.instrument_name,
    direction:        l.direction,
    ratio:            l.ratio,
    price:            roundToTick(parseFloat(document.getElementById(`lp-${id}-${i}`)?.value || 0)),
  }));
}

function collectHedge(id) {
  const h = S.rfqCache[id]?.hedge;
  if (!h) return null;
  return { instrument_name: h.instrument_name, direction: h.direction, price: h.price, amount: h.amount };
}

async function submitQuote(id) {
  const dir   = document.getElementById(`dir-${id}`).value;
  const amt   = parseFloat(document.getElementById(`amt-${id}`).value);
  const legs  = collectLegs(id);
  const hedge = collectHedge(id);

  const body = { block_rfq_id: parseInt(id), amount: amt, direction: dir, legs };
  if (hedge) body.hedge = hedge;

  try {
    const resp = await POST('/quotes/add', body);
    const data = await resp.json();
    if (resp.ok) {
      const qid = data.result?.block_rfq_quote_id ?? data.quote_id;
      S.quoteIds[id] = qid;
      syncButtons(id);
      toast(`Submitted! Quote ID: ${qid}`, 'success');
      loadMyQuotes();
    } else {
      toast('Submit failed: ' + (data.detail || resp.statusText), 'error');
    }
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

async function editQuote(id) {
  const qid  = S.quoteIds[id];
  if (!qid) { toast('No active quote to edit', 'error'); return; }
  const amt   = parseFloat(document.getElementById(`amt-${id}`).value);
  const legs  = collectLegs(id);
  const hedge = collectHedge(id);

  const body = { quote_id: qid, amount: amt, legs };
  if (hedge) body.hedge = hedge;

  try {
    const resp = await POST('/quotes/edit', body);
    const data = await resp.json();
    if (resp.ok) { toast(`Quote ${qid} updated`, 'success'); loadMyQuotes(); }
    else toast('Edit failed: ' + (data.detail || resp.statusText), 'error');
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

async function cancelQuote(id) {
  const qid = S.quoteIds[id];
  if (!qid) { toast('No active quote to cancel', 'error'); return; }
  try {
    const resp = await POST('/quotes/cancel', { quote_id: qid });
    const data = await resp.json();
    if (resp.ok) {
      delete S.quoteIds[id];
      syncButtons(id);
      toast(`Quote ${qid} cancelled`, 'success');
      loadMyQuotes();
    } else {
      toast('Cancel failed: ' + (data.detail || resp.statusText), 'error');
    }
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   TTX Countdown
═══════════════════════════════════════════════════════════════ */
function startCountdowns() {
  clearInterval(S.ttxTimer);
  tickCountdowns();
  S.ttxTimer = setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
  const now = Date.now();
  // Refresh price-age spans for all cached RFQs
  for (const [id, rfq] of Object.entries(S.rfqCache)) {
    for (let i = 0; i < (rfq.legs || []).length; i++) {
      const ts = rfq.legs[i]?.fair_price_ts;
      const el = document.getElementById(`fpts-${id}-${i}`);
      if (el && ts) el.textContent = fmtPriceAge(ts);
    }
  }
  for (const [id, rfq] of Object.entries(S.rfqCache)) {
    const el = document.getElementById(`ttx-${id}`);
    if (!el) continue;
    const expTs = rfq.expiration_timestamp;
    if (!expTs) { el.textContent = '—'; el.className = 'mono dim'; continue; }
    const ms = expTs - now;
    if (ms <= 0) {
      el.textContent = 'Expired';
      el.className = 'mono dim';
    } else {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      el.textContent = h > 0 ? `${h}h ${m % 60}m ${s % 60}s`
                     : m > 0 ? `${m}m ${s % 60}s`
                     :         `${s}s`;
      el.className = ms < 60_000  ? 'mono neg'
                   : ms < 300_000 ? 'mono warn'
                   :                'mono';
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   My Quotes — per-card section
═══════════════════════════════════════════════════════════════ */
function myQuotesHtml(id) {
  const quotes = S.myQuotes[String(id)] || [];
  if (!quotes.length) return '';
  const rows = quotes.map(q => {
    const sc     = { open: 'pos', cancelled: 'neg', filled: 'warn' }[q.quote_state] ?? 'dim';
    const dirCls = q.direction === 'buy' ? 'pos' : 'neg';
    const legPrices = (q.legs || []).map(l => {
      const d = l.direction === 'buy' ? '▲' : '▼';
      return `${d}${fmtN(l.price, 6)}`;
    }).join(' ');
    return `<tr>
      <td class="mono">${q.block_rfq_quote_id}</td>
      <td><span class="${dirCls}">${q.direction}</span></td>
      <td class="mono">${fmtN(q.amount, 4)}</td>
      <td class="mono dim" style="font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${esc(legPrices)}">${legPrices || '—'}</td>
      <td><span class="${sc}">${q.quote_state}</span></td>
    </tr>`;
  }).join('');
  return `<div class="my-quotes-section">
    <div class="my-quotes-title">My Quotes</div>
    <div class="tbl-wrap">
      <table style="font-size:11px">
        <thead><tr>
          <th>Quote ID</th><th>Dir</th><th>Amount</th><th>Leg Prices</th><th>State</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function loadMyQuotes() {
  try {
    const resp = await GET('/quotes');
    if (!resp.ok) return;
    const { quotes } = await resp.json();
    S.myQuotes = {};
    // Clear stale open-quote tracking; rebuild from live data
    for (const k of Object.keys(S.quoteIds)) delete S.quoteIds[k];
    const seen = new Set();
    for (const q of (quotes || [])) {
      if (seen.has(q.block_rfq_quote_id)) continue;
      seen.add(q.block_rfq_quote_id);
      const rid = String(q.block_rfq_id);
      if (!S.myQuotes[rid]) S.myQuotes[rid] = [];
      S.myQuotes[rid].push(q);
      // Track most recent open quote per RFQ for button state
      if (q.quote_state === 'open' && !S.quoteIds[rid])
        S.quoteIds[rid] = q.block_rfq_quote_id;
    }
    // Re-render quote sections in already-visible cards
    for (const id of Object.keys(S.rfqCache)) {
      const el = document.getElementById(`my-quotes-${id}`);
      if (el) el.innerHTML = myQuotesHtml(id);
      syncButtons(id);
    }
  } catch { /* credentials not configured — silent */ }
}

/* ═══════════════════════════════════════════════════════════════
   Quotes Tab
═══════════════════════════════════════════════════════════════ */
async function loadQuotes() {
  const cont = document.getElementById('quotes-container');
  cont.innerHTML = '<div class="loading"><span class="spin"></span> Loading…</div>';
  try {
    const resp = await GET('/quotes');
    if (!resp.ok) {
      cont.innerHTML = `<div class="alert alert-danger">Failed to load quotes (${resp.status})</div>`;
      return;
    }
    const data   = await resp.json();
    const quotes = data.quotes || [];

    if (!quotes.length) {
      cont.innerHTML = `<div class="alert alert-info">No open quotes</div>${cancelByIdHtml()}`;
      return;
    }

    const cols = ['block_rfq_quote_id', 'block_rfq_id', 'direction', 'amount', 'price', 'quote_state'];
    const ths  = cols.map(c => `<th>${c.replace(/_/g, ' ')}</th>`).join('');
    const trs  = quotes.map(q => {
      const sc = { open: 'pos', cancelled: 'neg', filled: 'dim' }[q.quote_state] || '';
      return `<tr>
        <td class="mono">${q.block_rfq_quote_id ?? '—'}</td>
        <td class="mono">${q.block_rfq_id ?? '—'}</td>
        <td><span class="${q.direction === 'buy' ? 'pos' : 'neg'}">${q.direction}</span></td>
        <td class="mono">${fmtN(q.amount, 4)}</td>
        <td class="mono">${fmtN(q.price, 8)}</td>
        <td><span class="${sc}">${q.quote_state ?? '—'}</span></td>
      </tr>`;
    }).join('');

    cont.innerHTML = `
      <div class="tbl-wrap">
        <table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
      </div>
      ${cancelByIdHtml()}`;

  } catch (e) {
    cont.innerHTML = `<div class="alert alert-danger">Error: ${esc(e.message)}</div>`;
  }
}

function cancelByIdHtml() {
  return `<hr>
  <h3 style="margin-bottom:8px">Cancel a specific quote</h3>
  <div style="display:flex;gap:8px;align-items:center">
    <input type="number" id="cancel-qid" placeholder="Quote ID"
           style="width:160px;margin:0">
    <button class="btn btn-danger btn-sm" onclick="cancelById()">Cancel</button>
  </div>`;
}

async function cancelById() {
  const qid = parseInt(document.getElementById('cancel-qid').value);
  if (isNaN(qid)) { toast('Enter a valid quote ID', 'error'); return; }
  try {
    const resp = await POST('/quotes/cancel', { quote_id: qid });
    const data = await resp.json();
    if (resp.ok) {
      // Remove from RFQ-level state if we tracked it
      for (const [k, v] of Object.entries(S.quoteIds)) {
        if (v === qid) { delete S.quoteIds[k]; syncButtons(k); }
      }
      toast(`Quote ${qid} cancelled`, 'success');
      loadQuotes();
    } else {
      toast('Cancel failed: ' + (data.detail || resp.statusText), 'error');
    }
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   Utilities
═══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════════════════════
   Per-second fair price updater for open RFQs
═══════════════════════════════════════════════════════════════ */
function startPriceUpdater() {
  clearInterval(S.priceTimer);
  S.priceTimer = setInterval(updateOpenRFQPrices, 1000);
}

async function updateOpenRFQPrices() {
  const openIds = Object.keys(S.rfqCache).filter(id => S.rfqCache[id].state === 'open');
  await Promise.all(openIds.map(updateRFQPrices));
}

async function updateRFQPrices(id) {
  const rfq = S.rfqCache[id];
  if (!rfq || rfq.state !== 'open') return;
  const legs = rfq.legs || [];

  await Promise.all(legs.map(async (leg, i) => {
    const p = encodeURIComponent(leg.instrument_name);
    try {
      const r = await fetch(BASE + `/price/${p}`);
      if (!r.ok) return;
      const d = await r.json();
      const price = d.price ?? null;
      const ts    = d.ts    ?? null;
      leg.fair_price    = price;
      leg.fair_price_ts = ts;

      // Update price value span and age div
      const valEl = document.getElementById(`fpv-${id}-${i}`);
      if (valEl) valEl.textContent = fmtN(price, 8);
      const tsEl = document.getElementById(`fpts-${id}-${i}`);
      if (tsEl) tsEl.textContent = fmtPriceAge(ts);

      // Update the quote input — skip if the user is currently typing in it
      const input = document.getElementById(`lp-${id}-${i}`);
      if (input && document.activeElement !== input) {
        input.value       = price !== null ? fmtN(price, 4) : '';
        input.placeholder = price !== null ? '' : 'N/A';
      }
    } catch {}
  }));

  // Recompute and update the combo fair price row
  const cmb      = combo(rfq);
  const comboCell = document.getElementById(`fp-${id}-combo`);
  if (comboCell) comboCell.textContent = fmtN(cmb.fair_price, 8);
}

/* ═══════════════════════════════════════════════════════════════
   Live updates via WebSocket → Redis pub/sub
═══════════════════════════════════════════════════════════════ */
let _wsDelay = 1000;

function setLiveStatus(state) {
  const el = document.getElementById('live-status');
  if (!el) return;
  if (state === 'connected') {
    el.textContent = '⬤ WS';
    el.style.color = 'var(--success)';
  } else if (state === 'reconnecting') {
    el.textContent = '⬤ WS reconnecting…';
    el.style.color = 'var(--warning)';
  } else {
    el.textContent = '⬤ WS offline';
    el.style.color = 'var(--danger)';
  }
}

async function pollHealth() {
  const el = document.getElementById('redis-status');
  if (!el) return;
  try {
    const resp = await fetch(BASE + '/health');
    if (!resp.ok) throw new Error(resp.statusText);
    const d = await resp.json();
    const ok = d.redis === 'ok' && d.pubsub === 'ok';
    const titleEl = document.getElementById('page-title');
    if (titleEl) titleEl.textContent = d.testnet ? 'Deribit Block RFQ [TEST]' : 'Deribit Block RFQ';
    const age = d.pubsub_last_msg_ago_s != null ? ` · last msg ${d.pubsub_last_msg_ago_s}s ago` : ' · no msg yet';
    if (ok) {
      el.textContent = `⬤ Redis${age}`;
      el.style.color = 'var(--success)';
    } else {
      const detail = [d.redis !== 'ok' ? 'redis' : '', d.pubsub !== 'ok' ? 'pubsub' : ''].filter(Boolean).join('+');
      el.textContent = `⬤ Redis ${detail} error${age}`;
      el.style.color = 'var(--danger)';
    }
  } catch {
    el.textContent = '⬤ Redis unreachable';
    el.style.color = 'var(--danger)';
  }
}

function connectLiveUpdates() {
  // Build WS URL relative to the current page so nginx subpath proxying works.
  // e.g. page at https://host/rfq/ → wss://host/rfq/ws
  const wsUrl = new URL('ws', location.href);
  wsUrl.protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let ws;
  try {
    ws = new WebSocket(wsUrl.toString());
  } catch (e) {
    setLiveStatus('offline');
    setTimeout(connectLiveUpdates, _wsDelay);
    _wsDelay = Math.min(_wsDelay * 2, 30000);
    return;
  }

  ws.onopen = () => {
    _wsDelay = 1000;  // reset backoff on successful connect
    setLiveStatus('connected');
  };

  ws.onmessage = e => {
    try { handleLiveUpdate(e.data); } catch (_) {}
  };

  ws.onclose = () => {
    setLiveStatus('reconnecting');
    setTimeout(connectLiveUpdates, _wsDelay);
    _wsDelay = Math.min(_wsDelay * 2, 30000);
  };

  ws.onerror = () => ws.close();
}

async function handleLiveUpdate(rawMsg) {
  let m;
  try { m = JSON.parse(rawMsg); } catch { return; }

  // Handle block_rfq.maker.* and block_rfq.taker.* RFQ state updates
  if ((m.type !== 'rfq' && m.type !== 'rfq_taker') || !m.id || !m.data) return;

  const id      = String(m.id);
  const newData = m.data;  // full Deribit RFQ payload

  if (S.rfqCache[id]) {
    // ── Existing card: update state badge in-place without touching price inputs ──
    S.rfqCache[id].state = newData.state;
    const card = document.getElementById(`rfq-${id}`);
    if (card) {
      const badge = card.querySelector('.rfq-header .badge');
      if (badge) badge.outerHTML = stateBadge(newData.state);
    }
    document.getElementById('ts').textContent = new Date().toLocaleTimeString();

  } else {
    // ── New RFQ: enrich and insert at the top ──
    if (S.tab !== 'rfqs') return;
    const cont = document.getElementById('rfqs-container');
    if (!cont || cont.querySelector('.loading')) return;

    // Show a placeholder card immediately so the user sees it right away
    const ph = document.createElement('div');
    ph.id        = `rfq-placeholder-${id}`;
    ph.className = 'rfq-card';
    ph.innerHTML = `<div class="rfq-header">
      <div class="rfq-id">#${id}</div>
      <div class="rfq-meta"><span class="spin"></span> Loading prices…</div>
    </div>`;
    cont.insertBefore(ph, cont.firstChild);

    const { id: rid, rfq } = await enrichRFQ(id, newData);
    S.rfqCache[rid] = rfq;
    const placeholder = document.getElementById(`rfq-placeholder-${rid}`);
    if (placeholder) {
      placeholder.insertAdjacentHTML('afterend', rfqCard(rid, rfq));
      placeholder.remove();
    }
    syncButtons(rid);
    startCountdowns();
  }
}

/* ═══════════════════════════════════════════════════════════════
   Recent trades poller
═══════════════════════════════════════════════════════════════ */
function fmtAgo(tsMs) {
  const s = Math.floor((Date.now() - tsMs) / 1000);
  if (s < 60)   return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

async function pollRecentTrades() {
  const box = document.getElementById('recent-trades-box');
  if (!box) return;
  try {
    const resp = await fetch(BASE + '/trades');
    if (!resp.ok) throw new Error(resp.statusText);
    const { trades } = await resp.json();
    if (!trades || trades.length === 0) {
      box.innerHTML = '<span class="dim" style="font-size:12px">No trades yet</span>';
      return;
    }
    box.innerHTML = trades.slice(0, 8).map(t => {
      const dir = t.direction || '—';
      const amt = t.amount != null ? t.amount : '—';
      const ts  = t.timestamp ? fmtAgo(t.timestamp) : '—';
      const legs = (t.legs || []).map(l => {
        const d = l.direction === 'buy' ? '<span class="pos">B</span>' : '<span class="neg">S</span>';
        return `${d} ${esc(l.instrument_name)}`;
      }).join('<br>');
      const dirCls = dir === 'buy' ? 'pos' : 'neg';
      return `<div class="trade-card">
        <div class="trade-card-header">
          <span class="trade-id">#${t.id ?? t.block_rfq_id ?? '?'}</span>
          <span class="trade-time">${ts}</span>
        </div>
        <div style="margin-bottom:3px">
          <span class="${dirCls}" style="font-size:11px;font-weight:600">${dir.toUpperCase()}</span>
          <span class="mono" style="font-size:11px"> ${amt}</span>
        </div>
        <div class="trade-leg">${legs}</div>
      </div>`;
    }).join('');
  } catch (e) {
    box.innerHTML = '<span class="dim" style="font-size:12px">Unavailable</span>';
  }
}

/* ═══════════════════════════════════════════════════════════════
   Total position greeks poller
═══════════════════════════════════════════════════════════════ */
async function pollTotalGreeks() {
  const box = document.getElementById('total-greeks-box');
  if (!box) return;
  try {
    const resp = await fetch(BASE + '/total_greeks');
    if (!resp.ok) throw new Error(resp.statusText);
    const d = await resp.json();
    const g = d.total_greeks || {};
    const delta = g.delta_position_total;
    const gamma = g.gamma_position_total;
    const vega  = g.vega_postition_total;  // note: typo in C++ source
    const fmt = v => (v == null ? '—' : v.toFixed(4));
    box.innerHTML = `
      <div class="greek-row"><span class="greek-label">Dollar Delta</span><span class="greek-val ${delta >= 0 ? 'pos' : 'neg'}">${fmt(delta)}</span></div>
      <div class="greek-row"><span class="greek-label">Dollar Gamma</span><span class="greek-val ${gamma >= 0 ? 'pos' : 'neg'}">${fmt(gamma)}</span></div>
      <div class="greek-row"><span class="greek-label">Dollar Vega</span> <span class="greek-val ${vega  >= 0 ? 'pos' : 'neg'}">${fmt(vega)}</span></div>`;
  } catch (e) {
    box.innerHTML = `<span class="dim" style="font-size:12px">Unavailable</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   Init
═══════════════════════════════════════════════════════════════ */
(function init() {
  connectLiveUpdates();
  pollHealth();
  setInterval(pollHealth, 5000);
  pollTotalGreeks();
  setInterval(pollTotalGreeks, 5000);
  pollRecentTrades();
  setInterval(pollRecentTrades, 10000);
  loadRFQs();
  startPriceUpdater();
})();
</script>
